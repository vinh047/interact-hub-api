name: InteractHub Backend CI/CD (Final Version)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write # Quan trọng để Login OIDC
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Chạy trên Linux cho nhanh và tiết kiệm
    steps:
      - uses: actions/checkout@v4

      - name: 1. Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 2. Restore & Build
        run: |
          dotnet restore InteractHub.sln
          dotnet build InteractHub.sln --configuration Release --no-restore

      # --- GIỮ LẠI BƯỚC TEST CỦA VINH ---
      - name: 3. Chạy Unit Tests
        run: dotnet test InteractHub.sln --configuration Release --no-build --verbosity normal

      - name: 4. Publish
        run: dotnet publish InteractHub.Api/InteractHub.Api.csproj -c Release -o ./publish

      - name: 5. Lưu Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: 1. Tải bản Build xuống
        uses: actions/download-artifact@v4
        with:
          name: webapp-package

      - name: 2. Đăng nhập Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 3. Triển khai lên Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'interacthub-api-vinh047'
          package: .