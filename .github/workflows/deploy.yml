name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy mã nguồn (Checkout Source Code)
        uses: actions/checkout@v4

      - name: 2. Thiết lập môi trường .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 3. Khôi phục các gói phụ thuộc (Restore dependencies)
        run: dotnet restore InteractHub.sln

      - name: 4. Đóng gói mã nguồn (Build Solution)
        run: dotnet build InteractHub.sln --configuration Release --no-restore

      - name: 5. Chạy Unit Tests
        run: dotnet test InteractHub.sln --configuration Release --no-build --verbosity normal